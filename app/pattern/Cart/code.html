<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>R&amp;T Express - Cart</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(252, 249, 248, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#ffdad4",
                        "surface-container-highest": "#e5e2e1",
                        "secondary-container": "#fe9832",
                        "surface-bright": "#fcf9f8",
                        "on-tertiary-fixed": "#002114",
                        "secondary-fixed-dim": "#ffb77a",
                        "surface-dim": "#dcd9d9",
                        "on-secondary-container": "#683700",
                        "secondary": "#8f4e00",
                        "primary-container": "#e32d19",
                        "surface-container": "#f0eded",
                        "tertiary": "#006b4a",
                        "on-background": "#1c1b1b",
                        "outline-variant": "#e6bdb6",
                        "on-primary-container": "#ffffff",
                        "background": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#005138",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffb4a7",
                        "inverse-primary": "#ffb4a7",
                        "on-secondary-fixed-variant": "#6d3a00",
                        "inverse-surface": "#313030",
                        "outline": "#916f69",
                        "on-primary-fixed-variant": "#920800",
                        "tertiary-fixed": "#7afac3",
                        "surface-container-high": "#eae7e7",
                        "error": "#ba1a1a",
                        "surface": "#fcf9f8",
                        "surface-tint": "#be0d00",
                        "on-tertiary-container": "#ffffff",
                        "on-surface-variant": "#5d403a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "secondary-fixed": "#ffdcc2",
                        "primary": "#bd0d00",
                        "tertiary-fixed-dim": "#5cdda8",
                        "surface-container-low": "#f6f3f2",
                        "tertiary-container": "#00875f",
                        "on-secondary-fixed": "#2e1500",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e5e2e1",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#400100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "16px",
                        "stack-md": "16px",
                        "stack-sm": "4px",
                        "base": "8px",
                        "gutter": "12px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "price-display": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "price-display": ["20px", { "lineHeight": "24px", "fontWeight": "800" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "28px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased selection:bg-primary/20 flex justify-center items-center min-h-screen bg-gray-100">
<!-- Mobile Container (to simulate phone view on desktop) -->
<div class="relative w-full max-w-[400px] h-[850px] bg-background shadow-2xl overflow-hidden md:rounded-[40px] md:border-8 md:border-surface-variant flex flex-col">
<!-- Vibrant Header Background (Simulating the gradient from the image) -->
<div class="absolute top-0 left-0 w-full h-[200px] bg-gradient-to-br from-primary via-secondary-container to-secondary-fixed-dim z-0"></div>
<!-- Custom TopAppBar for Cart (Transactional - No main nav shell) -->
<header class="relative z-10 w-full px-container-margin py-stack-md flex justify-between items-center text-on-primary">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white tracking-wide">Cart</h1>
<button aria-label="Clear cart" class="p-2 -mr-2 rounded-full hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-3xl">delete</span>
</button>
</header>
<!-- Main Content Area (White overlapping card) -->
<main class="relative z-20 flex-1 bg-surface rounded-t-[32px] mt-2 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] overflow-y-auto no-scrollbar pb-[180px]">
<!-- Drag Handle Indicator -->
<div class="w-full flex justify-center pt-3 pb-4">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Cart Items List -->
<div class="px-container-margin flex flex-col gap-stack-lg">
<!-- Item 1: Deluxe Quarter Pounder -->
<article class="flex gap-4">
<!-- Image -->
<div class="w-28 h-28 flex-shrink-0 rounded-2xl overflow-hidden bg-secondary-fixed/50">
<img alt="Deluxe Quarter Pounder" class="w-full h-full object-cover" data-alt="A high-quality, appetizing studio shot of a thick, juicy double beef burger with melted cheese, fresh lettuce, tomato, and a shiny sesame seed bun. The background is a soft, warm pastel orange, matching a modern fast-food branding aesthetic. Lighting is bright and highlights the freshness of the ingredients." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQeYQ4m1M-o-U1fDMAhX184TLQMnMJMBaVK6AyEsLLZTfzeR01YjWj4BLpoeFIzGkRmliY0N2SIdqXl3Wje-H_pq0XJywadxfhojJFRtmBvRR-AgWppN9ymQsRzPwT3rYSxpK9quWbU3a-4csTP7GZij4N4gh0wsVmMaGrIfU4upbXzIQ6JPfXBbH6-gQCPKeNzpPapq4FmZj-tff15aK6hr3KLHYQHhYLD4LC_n3GeEUQZFJbS_GDHO4b2wJvk4dTsipkwuUcB_E"/>
</div>
<!-- Details -->
<div class="flex-1 flex flex-col justify-between py-1">
<h2 class="font-label-lg text-label-lg text-on-surface leading-snug">Deluxe Quarter Pounder</h2>
<div class="flex items-center justify-between mt-2">
<!-- Quantity Controls -->
<div class="flex items-center gap-3">
<button aria-label="Decrease quantity" class="w-6 h-6 rounded-md bg-secondary-container/30 text-on-secondary-container flex items-center justify-center hover:bg-secondary-container/50 transition-colors">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<span class="font-label-lg text-label-lg w-3 text-center">2</span>
<button aria-label="Increase quantity" class="w-6 h-6 rounded-md bg-secondary-container text-on-primary flex items-center justify-center hover:bg-secondary transition-colors">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
<!-- Price -->
<span class="font-price-display text-price-display text-primary">$5.98</span>
</div>
<!-- Notes Input -->
<div class="mt-3 bg-surface-container-low rounded-lg px-3 py-2 flex items-center gap-2 border border-surface-variant/50">
<input class="bg-transparent border-none outline-none w-full font-body-sm text-body-sm text-on-surface-variant placeholder:text-outline p-0 focus:ring-0" placeholder="Add notes here" type="text"/>
<span class="material-symbols-outlined text-outline text-sm">edit</span>
</div>
</div>
</article>
<!-- Item 2: Combo Breakfast -->
<article class="flex gap-4">
<!-- Image -->
<div class="w-28 h-28 flex-shrink-0 rounded-2xl overflow-hidden bg-secondary-fixed/50">
<img alt="Combo Breakfast" class="w-full h-full object-cover" data-alt="A professional food photography shot of a classic breakfast combo featuring a layered sausage, egg, and cheese muffin sandwich, alongside golden crispy hash browns and a dark soda drink. The setting is clean with a warm, soft pastel yellow-orange background, emphasizing a morning energetic vibe in a bright light-mode aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB1KsYTzsYut24p8ZO5zZR-11nkvgKx1xsKlkSX717_E7-uA5ktl6me__6Yg-jXp5qi8kKqB2G5eKKYln28o84U1VWYRognrr0Neb2qDJ4ytNbmxkDorks0NnqVeXaoECJrBCaVUKPSBTE4oh1QcC6Lf1wOioJyQkn4vfF4qauwdrMbVsOXQjD97K1rzTQolsv9FtDirGdJLSQ2TYvRoJ6bqRM48KQaiWklhNFXx03xJ6BxkKU8gK8eQrAOK_qGnzTIXIl8rTl8W60"/>
</div>
<!-- Details -->
<div class="flex-1 flex flex-col justify-between py-1">
<h2 class="font-label-lg text-label-lg text-on-surface leading-snug">Combo Breakfast</h2>
<div class="flex items-center justify-between mt-2">
<!-- Quantity Controls -->
<div class="flex items-center gap-3">
<button aria-label="Decrease quantity" class="w-6 h-6 rounded-md bg-secondary-container/30 text-on-secondary-container flex items-center justify-center hover:bg-secondary-container/50 transition-colors">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<span class="font-label-lg text-label-lg w-3 text-center">1</span>
<button aria-label="Increase quantity" class="w-6 h-6 rounded-md bg-secondary-container text-on-primary flex items-center justify-center hover:bg-secondary transition-colors">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
<!-- Price -->
<span class="font-price-display text-price-display text-primary">$4.49</span>
</div>
<!-- Notes Input -->
<div class="mt-3 bg-surface-container-low rounded-lg px-3 py-2 flex items-center gap-2 border border-surface-variant/50">
<input class="bg-transparent border-none outline-none w-full font-body-sm text-body-sm text-on-surface-variant placeholder:text-outline p-0 focus:ring-0" placeholder="Add notes here" type="text"/>
<span class="material-symbols-outlined text-outline text-sm">edit</span>
</div>
</div>
</article>
</div>
<!-- Extra spacing at bottom to ensure content isn't hidden behind fixed footer -->
<div class="h-8"></div>
</main>
<!-- Fixed Bottom Checkout Area -->
<div class="absolute bottom-0 w-full bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-2xl z-30 flex flex-col">
<!-- Promo & Payment Method row -->
<div class="flex items-center justify-between px-container-margin py-4 border-b border-surface-variant/50">
<!-- Payment Selector -->
<button class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-tertiary">payments</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Cash</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm">expand_less</span>
</button>
<!-- Divider -->
<div class="h-6 w-px bg-surface-variant"></div>
<!-- Promo Action -->
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors pr-2">
                    ADD A PROMO
                </button>
</div>
<!-- Total & Order Button -->
<div class="px-container-margin py-4 flex items-center justify-between bg-surface-bright">
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface font-bold">Total:</span>
<span class="font-body-md text-body-md text-outline">$10.47</span>
</div>
<button class="bg-primary text-on-primary font-headline-lg-mobile text-headline-lg-mobile px-10 py-3 rounded-xl shadow-md shadow-primary/30 hover:bg-surface-tint active:scale-95 transition-all">
                    Order
                </button>
</div>
<!-- Safe area padding for newer iPhones -->
<div class="h-safe pb-4"></div>
</div>
</div>
</body></html>
