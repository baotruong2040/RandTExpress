        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

<body class="bg-on-surface/40 flex items-center justify-center min-h-screen">
<!-- Top Navigation (Task-Focused - Minimal Contextual Header overlaying image) -->
<!-- Main Content Canvas -->
<!-- Fixed Bottom Action Area (Add to Cart) -->
<!-- Suppressed BottomNavBar as this is a task-focused screen (Details) -->
<div class="" id="success-modal">
<!-- Glassmorphic Backdrop Overlay -->
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-surface rounded-3xl p-stack-lg shadow-2xl animate-in fade-in slide-in-from-bottom-10 duration-300">
<div class="flex flex-col items-center text-center">

<div class="w-16 h-16 bg-tertiary/10 rounded-full flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-tertiary text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>

<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg">1x Deluxe Quarter Pounder</p>

<button class="w-full py-4 px-6 bg-primary text-on-primary rounded-full font-label-lg text-label-lg shadow-sm active:scale-95 transition-all">

                </button>
<button class="w-full py-4 px-6 bg-transparent border border-outline text-primary rounded-full font-label-lg text-label-lg active:bg-surface-container-low transition-all" onclick="document.getElementById('success-modal').remove()">

                </button>
</div>
</div>
